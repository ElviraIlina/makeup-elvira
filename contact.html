<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Связаться с Эльвирой Ильиной — ELVIRAILINA MAKEUP">
  <title>ELVIRAILINA MAKEUP — Связаться</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header__inner container">
      <a href="index.html" class="header__logo">
        <span class="header__logo-name" data-site="site.logoName">Elvira Ilina</span>
        <span class="header__logo-tag" data-site="site.logoTag">makeup & hair</span>
      </a>
      <button class="burger" id="burger" aria-label="Меню" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav__link">Главная</a>
        <a href="gallery.html" class="nav__link">Галерея</a>
        <a href="contact.html" class="nav__link nav__link--active">Связаться</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section section--tall">
      <div class="container split">
        <div class="split__text prose">
          <h1 class="block-title">Telegram</h1>
          <p><a href="#" data-site-href="contact.telegramUrl" data-site="contact.telegramHandle">@elvirailina</a></p>
        </div>
        <div class="split__text prose">
          <h1 class="block-title">Instagram</h1>
          <p><a href="#" data-site-href="contact.instagramUrl" data-site="contact.instagramHandle">@elvirailina</a></p>
        </div>
      </div>
      <div class="container split contact-extra">
        <div class="split__text prose">
          <h2 class="block-title block-title--sm">Телефон</h2>
          <p><a href="tel:+79001234567" data-site-href="contact.phoneHref" data-site="contact.phone">+7 900 123 45 67</a></p>
        </div>
        <div class="split__text prose">
          <h2 class="block-title block-title--sm">Email</h2>
          <p><a href="mailto:hello@elvirailina.ru" data-site-href="contact.emailHref" data-site="contact.email">hello@elvirailina.ru</a></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <p class="footer__copy" data-site="footer.copyright">© ELVIRAILINA MAKEUP</p>
      <div class="footer__social">
        <a href="#" class="footer__social-link" aria-label="Instagram" data-site-href="footer.instagramUrl">Instagram</a>
        <a href="#" class="footer__social-link" aria-label="Telegram" data-site-href="footer.telegramUrl">Telegram</a>
      </div>
    </div>
  </footer>

  <script src="js/site-content.js"></script>
  <script src="js/content.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
